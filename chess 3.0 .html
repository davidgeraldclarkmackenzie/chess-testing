<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Rules Chess with Eval Bar</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        #status {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 4px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .selected { background-color: #7fffd4 !important; }

        #eval-container {
            width: 480px;
            height: 25px;
            background-color: #333;
            margin-top: 15px;
            border: 2px solid #333;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
        }
        #eval-bar {
            width: 50%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.3s ease;
        }
        #eval-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 25px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            mix-blend-mode: difference;
        }
    </style>
</head>
<body>

<div id="status">White's Turn</div>
<div id="board"></div>

<div id="eval-container">
    <div id="eval-bar"></div>
    <div id="eval-text">0.00</div>
</div>

<script>
    const pieces = {
        'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', 
        'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙', 
        ' ': ''
    };

    const pieceValues = {
        'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'k': 0,
        'P': 1, 'N': 3, 'B': 3, 'R': 5, 'Q': 9, 'K': 0,
        ' ': 0
    };

    let boardState = [
        ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
        ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
        ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
        ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
    ];

    let turn = 'White';
    let selectedSquare = null;
    const boardElement = document.getElementById('board');
    const statusElement = document.getElementById('status');
    const evalBarElement = document.getElementById('eval-bar');
    const evalTextElement = document.getElementById('eval-text');

    function drawBoard() {
        boardElement.innerHTML = '';
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const square = document.createElement('div');
                const isLight = (row + col) % 2 === 0;
                square.className = `square ${isLight ? 'light' : 'dark'}`;
                square.dataset.row = row;
                square.dataset.col = col;
                
                const piece = boardState[row][col];
                square.innerText = pieces[piece];

                if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
                    square.classList.add('selected');
                }

                square.addEventListener('click', () => handleSquareClick(row, col));
                boardElement.appendChild(square);
            }
        }
        updateEvaluation();
    }

    function updateEvaluation() {
        let whiteScore = 0;
        let blackScore = 0;
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const piece = boardState[row][col];
                if (piece !== ' ') {
                    if (piece === piece.toUpperCase()) whiteScore += pieceValues[piece];
                    else blackScore += pieceValues[piece];
                }
            }
        }
        const totalAdvantage = whiteScore - blackScore;
        let displayPercent = 50 + (totalAdvantage * 5); 
        displayPercent = Math.max(5, Math.min(95, displayPercent)); 
        evalBarElement.style.width = `${displayPercent}%`;
        evalTextElement.innerText = totalAdvantage === 0 ? "0.00" : (totalAdvantage > 0 ? `+${totalAdvantage}.00` : `${totalAdvantage}.00`);
    }

    function handleSquareClick(row, col) {
        const clickedPiece = boardState[row][col];
        const isWhite = clickedPiece !== ' ' && clickedPiece === clickedPiece.toUpperCase();
        const isBlack = clickedPiece !== ' ' && clickedPiece === clickedPiece.toLowerCase();

        if (selectedSquare === null) {
            if ((turn === 'White' && isWhite) || (turn === 'Black' && isBlack)) {
                selectedSquare = { row, col };
                drawBoard();
            }
        } else if (selectedSquare.row === row && selectedSquare.col === col) {
            selectedSquare = null;
            drawBoard();
        } else if ((turn === 'White' && isWhite) || (turn === 'Black' && isBlack)) {
            selectedSquare = { row, col };
            drawBoard();
        } else {
            if (isValidMove(selectedSquare.row, selectedSquare.col, row, col) && !wouldBeInCheck(selectedSquare.row, selectedSquare.col, row, col)) {
                // Execute move
                boardState[row][col] = boardState[selectedSquare.row][selectedSquare.col];
                boardState[selectedSquare.row][selectedSquare.col] = ' ';
                
                // Basic Pawn Promotion to Queen
                if (boardState[row][col] === 'P' && row === 0) boardState[row][col] = 'Q';
                if (boardState[row][col] === 'p' && row === 7) boardState[row][col] = 'q';

                selectedSquare = null;
                turn = (turn === 'White') ? 'Black' : 'White';
                statusElement.innerText = `${turn}'s Turn`;
                drawBoard();
                
                // Post-move state alerts
                checkGameEndingConditions();
            }
        }
    }

    function isPathClear(fromRow, fromCol, toRow, toCol) {
        const stepRow = Math.sign(toRow - fromRow);
        const stepCol = Math.sign(toCol - fromCol);
        let r = fromRow + stepRow;
        let c = fromCol + stepCol;
        while (r !== toRow || c !== toCol) {
            if (boardState[r][c] !== ' ') return false;
            r += stepRow;
            c += stepCol;
        }
        return true;
    }

    function isValidMove(fromRow, fromCol, toRow, toCol) {
        const piece = boardState[fromRow][fromCol];
        const target = boardState[toRow][toCol];
        const isWhite = piece === piece.toUpperCase();
        
        // Rule 1: Cannot capture own pieces
        if (target !== ' ') {
            const isTargetWhite = target === target.toUpperCase();
            if (isWhite === isTargetWhite) return false;
        }

        const dr = toRow - fromRow;
        const dc = toCol - fromCol;
        const absDr = Math.abs(dr);
        const absDc = Math.abs(dc);
        const type = piece.toLowerCase();

        // Rule 2: Specific Piece Movement
        switch (type) {
            case 'p': // Pawn Rules
                const dir = isWhite ? -1 : 1;
                const startRow = isWhite ? 6 : 1;
                
                // Forward 1 step
                if (dc === 0 && dr === dir && target === ' ') return true;
                // Forward 2 steps from start
                if (dc === 0 && fromRow === startRow && dr === 2 * dir && target === ' ' && boardState[fromRow + dir][fromCol] === ' ') return true;
                // Diagonal capture
                if (absDc === 1 && dr === dir && target !== ' ') return true;
                return false;

            case 'n': // Knight Rules (L-shape, can jump over pieces)
                return (absDr === 2 && absDc === 1) || (absDr === 1 && absDc === 2);

            case 'b': // Bishop Rules (Diagonal sliding)
                if (absDr !== absDc) return false;
                return isPathClear(fromRow, fromCol, toRow, toCol);

            case 'r': // Rook Rules (Straight lines sliding)
                if (dr !== 0 && dc !== 0) return false;
                return isPathClear(fromRow, fromCol, toRow, toCol);

            case 'q': // Queen Rules (Combination of Rook and Bishop)
                if (absDr !== absDc && dr !== 0 && dc !== 0) return false;
                return isPathClear(fromRow, fromCol, toRow, toCol);

            case 'k': // King Rules (1 square any direction)
                return absDr <= 1 && absDc <= 1;

            default:
                return false;
        }
    }

    // Safety logic preventing illegal self-sabotaging King moves
    function findKing(isWhite) {
        const targetKing = isWhite ? 'K' : 'k';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (boardState[r][c] === targetKing) return { row: r, col: c };
            }
        }
        return null;
    }

    function isInCheck(isWhiteColor) {
        const kingPos = findKing(isWhiteColor);
        if (!kingPos) return false; // Edge safety fallback
        
        for (let r = 0; r < 8; r++) {
