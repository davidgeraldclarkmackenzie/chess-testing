<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Chess Game</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }
        .board-container {
            width: 480px;
            height: 480px;
            max-width: 90vw;
            max-height: 90vw;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: white;
            border-radius: 4px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            overflow: hidden;
        }
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            user-select: none;
            cursor: pointer;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .selected { background-color: #7ab874 !important; }
        .eval-bar {
            width: 480px;
            max-width: 90vw;
            height: 24px;
            background-color: #222;
            margin-top: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: flex;
            overflow: hidden;
        }
        .eval-inner {
            width: 50%;
            height: 100%;
            background-color: #fff;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <h2 id="status">White's Turn</h2>

    <div class="board-container" id="board"></div>

    <div class="eval-bar">
        <div id="evalInner" class="eval-inner"></div>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const evalInnerEl = document.getElementById('evalInner');

        let turn = 'w';
        let selectedSquare = null;

        // Simplified starting board array using clean Unicode chess symbols
        const boardState = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        const whitePieces = ['♙', '♖', '♘', '♗', '♕', '♔'];
        const blackPieces = ['♟', '♜', '♞', '♝', '♛', '♚'];

        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((r + c) % 2 === 0 ? 'light' : 'dark');
                    square.dataset.row = r;
                    square.dataset.col = c;
                    square.textContent = boardState[r][c];

                    if (selectedSquare && selectedSquare.row === r && selectedSquare.col === c) {
                        square.classList.add('selected');
                    }

                    square.addEventListener('click', () => handleSquareClick(r, c));
                    boardEl.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];

            if (selectedSquare) {
                // If clicking the same square, deselect it
                if (selectedSquare.row === r && selectedSquare.col === c) {
                    selectedSquare = null;
                    createBoard();
                    return;
                }

                // Execute the move
                boardState[r][c] = boardState[selectedSquare.row][selectedSquare.col];
                boardState[selectedSquare.row][selectedSquare.col] = '';
                selectedSquare = null;
                
                // Switch turn
                turn = turn === 'w' ? 'b' : 'w';
                statusEl.textContent = turn === 'w' ? "White's Turn" : "Black's Turn";
                evalInnerEl.style.width = turn === 'w' ? "50%" : "30%";
                
                createBoard();
            } else {
                // Select a piece if it belongs to the correct player
                if (piece === '') return;
                if (turn === 'w' && !whitePieces.includes(piece)) return;
                if (turn === 'b' && !blackPieces.includes(piece)) return;

                selectedSquare = { row: r, col: c };
                createBoard();
            }
        }

        createBoard();
    </script>
</body>
</html>
