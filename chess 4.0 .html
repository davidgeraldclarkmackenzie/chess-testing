<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Chess Game</title>
    
    <!-- Includes standard open-source styling for the chessboard squares -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        /* Container keeping the board exactly 500px wide */
        .board-container {
            width: 500px;
            max-width: 90vw;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: white;
            padding: 10px;
            border-radius: 4px;
        }

        /* The bar below the board simulating an evaluation bar or status track */
        .eval-bar {
            width: 500px;
            max-width: 90vw;
            height: 24px;
            background-color: #222;
            margin-top: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .eval-inner {
            width: 50%; /* Starts at 50% split */
            height: 100%;
            background-color: #fff;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- Dynamic turn header -->
    <h2 id="status">White's Turn</h2>

    <!-- Visual Chess Board Container -->
    <div class="board-container">
        <div id="myBoard" style="width: 100%;"></div>
    </div>

    <!-- Bottom evaluation layout visual matching your screenshot -->
    <div class="eval-bar">
        <div id="evalInner" class="eval-inner"></div>
    </div>

    <!-- REQUIRED LIBRARIES: Loaded via verified CDN so you don't need local files -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // Initialize the logic rules engine and the visual board
        const game = new Chess();
        const statusEl = document.getElementById('status');
        const evalInnerEl = document.getElementById('evalInner');

        // Rule check: prevents dragging pieces belonging to the wrong turn or when game ends
        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;

            // Only allow White pieces to move on White's turn, and Black on Black's turn
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        // Action block: runs instantly when a piece is dropped onto a square
        function onDrop(source, target) {
            // Attempt to validate and make the move in the game logic
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Automatically promotes pawns to a Queen for simplicity
            });

            // If the move is completely illegal under chess rules, snap the piece back
            if (move === null) return 'snapback';

            updateStatus();
        }

        // Smoothly updates piece positions after animations finish
        function onSnapEnd() {
            board.position(game.fen());
        }

        // Updates the turn text and adjusts the split bar at the bottom
        function updateStatus() {
            let status = '';
            let moveColor = 'White';
            
            if (game.turn() === 'b') {
                moveColor = 'Black';
            }

            // Check match states
            if (game.in_checkmate()) {
                status = `Game over, ${moveColor} is in checkmate.`;
            } else if (game.in_draw()) {
                status = 'Game over, drawn position.';
            } else {
                status = `${moveColor}'s Turn`;
                if (game.in_check()) {
                    status += ' (In Check!)';
                }
            }

            statusEl.innerHTML = status;

            // Shorthand logic to move the visual layout bar based on active turns
            if (game.turn() === 'w') {
                evalInnerEl.style.width = "65%"; // White bar grows
            } else {
                evalInnerEl.style.width = "35%"; // White bar shrinks, showing more black
            }
        }

        // Visual board asset configurations using default online piece images
        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com{piece}.png'
        };

        const board = Chessboard('myBoard', config);
        updateStatus();
    </script>
</body>
</html>
